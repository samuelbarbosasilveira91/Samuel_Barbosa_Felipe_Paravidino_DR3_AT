server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
      routes:
        - id: card-service-route
          uri: lb://card-service
          predicates:
            - Path=/api/cards/**
        - id: trade-service-route
          uri: lb://trade-service
          predicates:
            - Path=/api/trades/**

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true
